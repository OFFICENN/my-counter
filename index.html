<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文字数カウンター</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</head>
<body>
    <div class="container">
        <h1>文字数カウンター</h1>
        <textarea id="textInput" placeholder="ここに文章を入力してください..."></textarea>
        
        <div class="result">
            <p>全文字数: <span id="totalChar">0</span></p>
            <p>空白抜き: <span id="noSpaceChar">0</span></p>
            <p>改行数: <span id="lineCount">0</span></p>
        </div>
        <button id="clearBtn">リセット</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
